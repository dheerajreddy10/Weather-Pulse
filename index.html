<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <div class="weatherHeading flex justify-center items-center flex-col m-8">
        <div class="weatherMainHeading">
          <h2 class="text-white text-4xl font-bold">🌦️ Weather Pulse</h2>
        </div>
        <div class="weatherHeadingDescription">
          <p class="text-gray-500 ">Real Time Weather Application</p>
        </div>
      </div>
    </header>

    <div class="weatherSearch flex flex-row gap-3 mx-5 my-6">
      <div class="weatherInput">
        <input
          type="text"
          class="text-white border-2 border-gray-700 w-[1400px] rounded-md p-2"
          placeholder="Enter The Place"
          id="placeInput"
        />
      </div>

      <button
        class="weatherSearchButton bg-blue-600 border border-blue-400 text-white px-4 py-2 rounded-md font-bold"
        id="searchButton"
      >
        Search
      </button>
    </div>

    <main id="weather-info">

    </main>

    <script src="index.js"></script>
  </body>
</html>
